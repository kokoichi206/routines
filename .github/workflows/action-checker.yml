name: action_checker
on:
  # 手動実行できるようにする！
  workflow_dispatch:
  schedule:
    # 日本時間23時00分
    - cron: '0 14 * * *'

jobs:
  checker:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      TZ: Asia/Tokyo
    defaults:
      run:
        shell: bash
        working-directory: ./action_checker/
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          # pip更新
          pip install -r requirements.txt

      - name: Run script
        env:
          # ブラウザで直接アクセスする方法だと未ログイン扱いで UTC の集計になる。
          # GraphQL API + JST ユーザーの PAT（read:user スコープ）なら
          # ログイン済みブラウザと同じ JST ベースの集計が得られる。
          # secrets.GITHUB_TOKEN はユーザーに紐づかないため UTC になり使えない。
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python events.py \
            "${{ secrets.CHECK_DISCORD_WEBHOOK_URL }}" \
            "${{ secrets.CHECK_USERS }}" \
            "${{ secrets.CHECK_STEPS }}" \
            "${{ secrets.CHECK_IMG_BASE_URL }}" \
            "${{ secrets.CHECK_IMG_URL_BASIC_AUTH_USER }}" \
            "${{ secrets.CHECK_IMG_URL_BASIC_AUTH_PASS }}"

      - name: Report if checker hadn't worked.
        if: failure()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{"content": "contributionsの確認が正常に行えませんでした..."}' \
            "${{ secrets.CHECK_DISCORD_WEBHOOK_URL }}"
